services:
  - type: web
    name: breathe-affordability-api
    runtime: python
    rootDir: civic_affordability_pg/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: web
    name: breathe-dashboard
    runtime: python
    buildCommand: pip install -r breathe_fastapi/requirements.txt
    startCommand: uvicorn breathe_fastapi.main:app --host 0.0.0.0 --port $PORT
